name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy
      - name: Tests
        run: uv run pytest -q
      # Deterministic cassette replay: free, no API key. Fails on a cassette
      # miss, which means the model-facing prompt changed — re-record with
      # `uv run evals/runner.py --live` and commit the refreshed cassettes
      # and report alongside the prompt change.
      - name: Eval regression
        run: uv run evals/runner.py
