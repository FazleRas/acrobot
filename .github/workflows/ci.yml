name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy
      - name: Tests
        run: uv run pytest -q
      # Weekend 3: add `uv run python evals/runner.py --cassette` here so prompt
      # changes are regression-tested against recorded responses on every PR.
